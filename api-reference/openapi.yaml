        events:
          - name: notification.created
            description: Emitted when a new notification is created for the subscriber; includes notification ID, type, and payload
          - name: notification.read
            description: Emitted when a notification is marked as read, allowing multi-tab sync
          - name: ping
            description: Keepalive ping emitted every 30 seconds to prevent connection timeouts
