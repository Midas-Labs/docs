        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /v1/roles:
    get:
      operationId: listRoles
      summary: List roles
      description: Returns all roles defined for the authenticated tenant, including built-in role templates (owner, admin, manager, staff, readonly) and custom roles.
      tags:
