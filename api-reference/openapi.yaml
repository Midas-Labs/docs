      description: "List capacity windows for flow-based products. Each window represents an operating period (e.g. 09:00–21:00) with a max concurrent occupancy limit. Used by climbing gyms, play areas, open-swim sessions, and similar venues."
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/StartingAfterParam'
        - $ref: '#/components/parameters/EndingBeforeParam'
