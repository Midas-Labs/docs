                        type: boolean
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags:
        - Scheduling
      summary: Create capacity window
      operationId: createCapacityWindow
      description: Create a capacity window for a flow-based product. Defines an operating period with a maximum concurrent occupancy. Window times are stored in UTC; provide times in the location's local timezone and they will be converted automatically.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyParam'
