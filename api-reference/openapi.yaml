        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      operationId: deleteRole
      summary: Delete role
      description: Deletes a custom role. Users currently assigned this role will have it removed from their Keto relation tuples. Built-in role templates cannot be deleted. Requires tenant admin permissions.
