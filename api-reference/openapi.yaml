  /v1/time-clock:
    get:
      operationId: listTimeClockEntries
      summary: List time clock entries
      description: Returns a paginated list of time clock entries for the tenant. Admins see all entries; staff see only their own. Supports filtering by user, location, and date range.
      tags:
        - Time Clock
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/StartingAfterParam'
        - $ref: '#/components/parameters/EndingBeforeParam'
        - $ref: '#/components/parameters/ExpandParam'
        - name: user_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter entries by user ID
        - name: location_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter entries by location ID
        - name: start_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter entries on or after this date (ISO 8601)
        - name: end_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter entries on or before this date (ISO 8601)
      responses:
        '200':
          description: Paginated list of time clock entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    enum: [list]
                  url:
                    type: string
                  has_more:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimeClockEntry'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/time-clock/clock-in:
    post:
      operationId: clockIn
      summary: Clock in
      description: Records a clock-in event for the authenticated user at the specified location. Returns an error if the user is already clocked in.
      tags:
        - Time Clock
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - location_id
              properties:
                location_id:
                  type: string
                  format: uuid
                  description: Location where the user is clocking in
                notes:
                  type: string
                  maxLength: 500
                  description: Optional notes for this clock-in event
      responses:
        '201':
          description: Clock-in recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeClockEntry'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/time-clock/{id}/clock-out:
    post:
      operationId: clockOut
      summary: Clock out
      description: Records a clock-out event for the specified time clock entry. The entry must belong to the authenticated user and must have an open clock-in with no clock-out.
      tags:
        - Time Clock
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Time clock entry ID to clock out from
        - $ref: '#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
                  maxLength: 500
                  description: Optional notes for this clock-out event
      responses:
        '200':
          description: Clock-out recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeClockEntry'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/time-clock/{id}:
    put:
      operationId: updateTimeClockEntry
      summary: Update time clock entry (admin)
      description: Allows administrators to correct clock-in or clock-out times on an existing entry. Requires tenant admin or manager permissions. Changes are recorded in the audit log.
      tags:
        - Time Clock
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
