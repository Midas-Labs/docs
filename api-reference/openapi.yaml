  /v1/availability:
    get:
      tags:
        - Scheduling
      summary: Query unified availability
      operationId: getAvailability
      description: |
        Unified availability dispatcher. Resolves the product's `timing_model` and delegates to the appropriate scheduling strategy (TimeSlottedStrategy, FlowBasedStrategy, HybridStrategy, etc.). Returns a polymorphic availability result whose shape depends on the product's timing model.

        - `time_slotted`: returns discrete slots with start/end times and remaining capacity
        - `flow_based`: returns capacity windows with current occupancy vs max concurrent
        - `hybrid`: returns mixed segments (time-slotted for peak hours, flow-based for off-peak)

        This is the highest-traffic read path on the scheduling module. Responses are cached in Redis with a 30-second TTL per product/date combination.
      parameters:
        - name: product_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: The product to query availability for. Determines which scheduling strategy is used.
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: The date to query (YYYY-MM-DD). Use with `days` for a range.
        - name: location_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: The location to query. Used for timezone conversion and resource filtering.
        - name: party_size
          in: query
          schema:
            type: integer
            minimum: 1
          description: Filter to only return slots/windows with sufficient remaining capacity for this party size.
        - name: days
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 31
            default: 1
          description: Number of days to include in the availability window (up to 31).
      responses:
        '200':
          description: Polymorphic availability result — shape depends on the product's timing_model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotAvailability'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

