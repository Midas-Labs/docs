        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/roles/{id}:
    put:
      operationId: updateRole
      summary: Update role
      description: Updates a custom role's name, description, or permission set. Built-in role templates cannot be modified. Changes propagate to Keto relation tuples. Requires tenant admin permissions.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleUpdateRequest'
      responses:
        '200':
          description: Updated role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '401':
