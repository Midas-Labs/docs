      tags:
        - Scheduling
      summary: List active occupancy sessions
      operationId: listOccupancySessions
      description: List occupancy sessions for flow-based capacity windows. Returns sessions filtered by status (defaults to active checked_in sessions). Each session tracks one guest group through the flow-based lifecycle (reserved → checked_in → checked_out).
