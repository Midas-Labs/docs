            type: string
            format: uuid
          description: Time clock entry ID to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clocked_in_at:
                  type: string
                  format: date-time
                  description: Corrected clock-in timestamp (ISO 8601)
                clocked_out_at:
                  type: string
                  format: date-time
                  description: Corrected clock-out timestamp (ISO 8601)
                notes:
                  type: string
                  maxLength: 500
                  description: Reason for the correction
      responses:
        '200':
          description: Updated time clock entry
          content:
            application/json:
              schema:
