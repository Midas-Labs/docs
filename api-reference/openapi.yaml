  /v1/carts/{id}/checkout:
    post:
      tags:
        - Booking
      summary: Checkout cart
      operationId: checkoutCart
      description: |
        Checkout a cart and create an order and associated bookings. Dispatches the `BookingWorkflow` Temporal saga asynchronously.

        Workflow steps:
        1. ReserveSlotActivity — hard capacity lock (optimistic concurrency on slot version)
        2. CreateOrderActivity — insert order, bookings, extras, and participants
        3. ProcessPaymentActivity — charge payment method via gateway
        4. AssignResourcesActivity — assign rooms, lanes, or equipment
        5. ConfirmBookingActivity — set booking status to `confirmed`, dispatch confirmation email

        Returns 202 Accepted immediately. Poll `GET /v1/orders/{order_id}` or subscribe to `GET /v1/orders/{order_id}/events` for real-time status. If payment fails, the saga compensates by releasing the capacity hold and cancelling the order.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - channel
              properties:
                customer_id:
                  type: string
                  format: uuid
                  description: Customer ID. Optional for anonymous checkouts.
                payment_method_id:
                  type: string
                  format: uuid
                  description: Saved payment method ID. Mutually exclusive with payment_token.
                payment_token:
                  type: string
                  description: One-time gateway token from card terminal. Mutually exclusive with payment_method_id.
                channel:
                  type: string
                  enum:
                    - web
                    - kiosk
                    - phone
                    - pos
                  description: Booking channel for reporting and analytics.
                billing_address:
                  type: object
                  description: Optional billing address for tax calculation.
                  properties:
                    line1:
                      type: string
                    line2:
                      type: [string, 'null']

                    city:
                      type: string
                    state:
                      type: string
                    postal_code:
                      type: string
                    country:
                      type: string
                      description: ISO 3166-1 alpha-2 country code
      responses:
        '202':
          description: Checkout accepted — BookingWorkflow dispatched asynchronously
          headers:
            Location:
              description: URL to poll for order status
              schema:
                type: string
            X-Workflow-Id:
              description: Temporal workflow ID for observability
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum:
                      - processing
                  poll_url:
                    type: string
                    description: URL to poll for order status (GET /v1/orders/{order_id})
                  workflow_id:
                    type: string
                    description: Temporal workflow ID for observability
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/orders:
