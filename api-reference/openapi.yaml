  /v1/bookings/reserve:
    post:
      tags:
        - Booking
      summary: Reserve Confirm Later — create tentative booking
      operationId: reserveBooking
      description: |
        Reserve Confirm Later flow entry point. Creates a booking in `tentative` status for party inquiries, large groups, or premium events that require operator approval before being confirmed.

        No capacity is hard-locked at this stage (soft hold only). A `hold_expires_at` timestamp is set based on the product's `flow_config.hold_hours`. The operator must call `POST /v1/bookings/{id}/confirm` or `POST /v1/bookings/{id}/decline` before expiry.

        If `auto_cancel` is configured on the product, the system will automatically cancel the booking at expiry and trigger a `ReservationExpiredActivity` notification.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_id
                - requested_date
                - party_size
              properties:
                product_id:
                  type: string
                  format: uuid
                  description: Must be a product with flow_mode = reserve_confirm_later
                location_id:
                  type: string
                  format: uuid
                customer_id:
                  type: string
                  format: uuid
                requested_date:
                  type: string
                  format: date
                  description: Requested activity date (YYYY-MM-DD)
                requested_time:
                  type: string
                  pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                  description: Requested start time (HH:MM, 24-hour). Optional — guest may leave flexible.
                party_size:
                  type: integer
                  minimum: 1
                notes:
                  type: string
                  description: Special requests or notes from the guest
                contact_name:
                  type: string
                contact_email:
                  type: string
                  format: email
                contact_phone:
                  type: string
      responses:
        '201':
          description: Tentative booking created — awaiting operator review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

