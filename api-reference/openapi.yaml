        - Scheduling
      summary: Check in to occupancy session
      operationId: checkInOccupancySession
      description: Transition an occupancy session from `reserved` to `checked_in`. Increments `current_occupancy` on the parent capacity window using optimistic concurrency (retries up to 3 times on version conflict). Rejects if max_concurrent would be exceeded.
