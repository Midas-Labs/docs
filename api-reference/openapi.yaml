  /.well-known/jwks.json:
    get:
      operationId: getJwks
      summary: JSON Web Key Set
      description: Public JWKS endpoint for verifying JWTs issued by the platform. No authentication required.
      tags:
        - Admin
      security: []
      responses:
        '200':
          description: JSON Web Key Set
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      properties:
                        kty:
                          type: string
                        use:
                          type: string
                        kid:
                          type: string
                        alg:
                          type: string
                        n:
                          type: string
                        e:
                          type: string
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: "API key (sk_live_... or sk_test_...)"
    sessionAuth:
      type: apiKey
      in: header
      name: X-Widget-Session

  parameters:
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    StartingAfterParam:
      name: starting_after
      in: query
      description: "Cursor: fetch page after this object ID"
      schema:
        type: string
        format: uuid
    EndingBeforeParam:
      name: ending_before
      in: query
      schema:
        type: string
        format: uuid
    ExpandParam:
      name: "expand[]"
      in: query
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
    IdempotencyKeyParam:
      name: Idempotency-Key
      in: header
      schema:
        type: string
        format: uuid
    LocationIdFilter:
      name: location_id
      in: query
      schema:
        type: string
        format: uuid
    CreatedGteFilter:
      name: created_gte
      in: query
      schema:
        type: string
        format: date-time
    CreatedLteFilter:
      name: created_lte
      in: query
      schema:
        type: string
        format: date-time

  headers:
    RequestId:
      description: "Unique request identifier for debugging"
      schema:
        type: string
    RateLimitLimit:
      schema:
        type: integer
    RateLimitRemaining:
      schema:
        type: integer
    RateLimitReset:
      description: "Unix timestamp when limit resets"
      schema:
        type: integer

  responses:
    BadRequestError:
      description: "Bad request"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnauthorizedError:
      description: "Authentication required"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ForbiddenError:
      description: "Insufficient permissions"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFoundError:
      description: "Resource not found"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ConflictError:
      description: "Idempotency key conflict or resource state conflict"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: "Unprocessable entity"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimitError:
      description: "Rate limit exceeded"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: "Internal server error"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:

    # ---------------------------------------------------------------------------
    # Shared
    # ---------------------------------------------------------------------------

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [type, code, message, request_id]
          properties:
            type:
              type: string
              enum: [api_error, validation_error, business_error, idempotency_error]
            code:
              type: string
            message:
              type: string
            param:
              type: [string, 'null']

            request_id:
              type: string
            doc_url:
              type: [string, 'null']


    ListResponse:
      type: object
      required: [object, url, has_more, data]
      properties:
        object:
          type: string
          const: list
        url:
          type: string
        has_more:
          type: boolean
        data:
          type: array
          items: {}

    DeletedResponse:
      type: object
      required: [id, object, deleted]
      properties:
        id:
          type: string
          format: uuid
        object:
          type: string
        deleted:
          type: boolean
          const: true

    Address:
      type: object
      properties:
        line1:
          type: string
        line2:
          type: [string, 'null']

        city:
          type: string
        state:
          type: string
        postal_code:
          type: string
        country:
          type: string

    # ---------------------------------------------------------------------------
    # Core
    # ---------------------------------------------------------------------------

    Tenant:
      type: object
      required: [id, object, name, slug, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        object:
          type: string
          const: tenant
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, suspended, cancelled]
        timezone:
          type: string
        currency:
          type: string
        settings:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties:
            type: string
          description: "Up to 50 key-value pairs"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TenantCreateRequest:
      type: object
      required: [name, slug, timezone, currency]
      properties:
        name:
          type: string
        slug:
          type: string
        timezone:
          type: string
        currency:
          type: string
        settings:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties:
            type: string

    TenantUpdateRequest:
      type: object
      properties:
        name:
          type: string
        timezone:
          type: string
        currency:
          type: string
        status:
          type: string
          enum: [active, suspended, cancelled]
        settings:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties:
            type: string

    Location:
