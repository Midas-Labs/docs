                    enum: [list]
                  url:
                    type: string
                  has_more:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Role'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      operationId: createRole
      summary: Create role
      description: Creates a custom role with specified permissions. Permissions are stored as Keto relation tuples; the core.roles row is a read projection. Requires tenant admin permissions.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
