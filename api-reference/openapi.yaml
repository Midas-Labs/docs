            format: uuid
          description: Filter windows by resource
        - name: window_date
          in: query
          schema:
            type: string
            format: date
          description: Filter windows for a specific date (YYYY-MM-DD)
      responses:
        '200':
          description: Paginated list of capacity windows
          content:
