                booking_time:
                  type: string
                  pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                  description: New booking time (HH:MM, 24-hour)
                slot_instance_id:
                  type: string
                  format: uuid
                  description: Target slot instance ID (for time-slotted products)
                capacity_window_id:
                  type: string
                  format: uuid
                  description: Target capacity window ID (for flow-based products)
                reason:
                  type: string
                  description: Reason for rescheduling (audit log)
      responses:
