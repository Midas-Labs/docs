      operationId: confirmBooking
      description: Operator confirms a `tentative` booking. Transitions status to `confirmed`, hard-locks capacity, and (if configured) charges a deposit. Sends a confirmation notification to the guest. Valid only from `tentative` status.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmed_date:
                  type: string
                  format: date
                  description: Confirmed activity date. May differ from requested_date.
                confirmed_time:
                  type: string
                  pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                  description: Confirmed start time (HH:MM, 24-hour)
                resource_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Resources to assign to the booking
                operator_notes:
                  type: string
                  description: Internal notes for the confirmation
                collect_deposit:
                  type: boolean
                  description: Whether to collect a deposit on confirmation (per product flow_config)
      responses:
        '200':
          description: Booking confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/bookings/{id}/decline:
    post:
      tags:
        - Booking
      summary: Decline reserved booking
      operationId: declineBooking
      description: Operator declines a `tentative` booking inquiry. Transitions status to `cancelled`. Sends a decline notification to the guest. Valid only from `tentative` status.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for declining (communicated to guest in notification)
      responses:
        '200':
          description: Booking declined and cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/bookings/{id}/schedule:
    post:
      tags:
        - Booking
      summary: Attach schedule to prepaid booking
      operationId: scheduleBooking
      description: |
        Pay First flow scheduling step. The recipient of a prepaid booking uses their single-use scheduling token to select a date and time. Transitions the booking from `pending` to `scheduled`.

        Dispatches `PrepaidSchedulingWorkflow` which:
        1. ValidateTokenActivity — verify HMAC-SHA256 token, check expiry and single-use state
        2. ReserveSlotActivity — hard capacity lock on the selected slot
        3. UpdateBookingActivity — set booking_date, booking_time, status → scheduled
        4. CollectBalanceActivity — if deposit was taken, collect remaining balance
        5. ConfirmBookingActivity — set status → confirmed, dispatch confirmation email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - scheduling_token
                - booking_date
                - booking_time
              properties:
                scheduling_token:
                  type: string
                  description: Single-use HMAC-SHA256 scheduling token from the scheduling link email
                booking_date:
                  type: string
                  format: date
                  description: Selected activity date (YYYY-MM-DD)
                booking_time:
                  type: string
                  pattern: '^([01]\d|2[0-3]):[0-5]\d$'
                  description: Selected start time (HH:MM, 24-hour)
                slot_instance_id:
                  type: string
                  format: uuid
                  description: Target slot instance ID (for time-slotted products)
                capacity_window_id:
                  type: string
                  format: uuid
                  description: Target capacity window ID (for flow-based products)
                balance_payment_method_id:
                  type: string
                  format: uuid
                  description: Payment method for collecting remaining balance (if deposit was taken)
                balance_payment_token:
                  type: string
                  description: One-time token for balance collection. Mutually exclusive with balance_payment_method_id.
      responses:
        '200':
          description: Booking scheduled and confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/walk-in/check-in:
    post:
      tags:
        - Booking
      summary: Walk-in check-in
      operationId: walkInCheckIn
      description: |
        Check-In First flow entry point. Creates a walk-in booking in `checked_in` status and opens an order with `amount_due: 0`. Used by staff at POS for guests arriving without a reservation.

        Dispatches `WalkInWorkflow` which:
        1. CheckCapacityActivity — verify current occupancy against the scheduling strategy
        2. CreateBookingActivity — insert booking with status `checked_in`
        3. CreateOpenOrderActivity — insert order with `amount_due: 0`
        4. ReserveCapacityActivity — hard capacity lock (increment `current_occupancy` for flow-based products)
        5. AssignResourcesActivity — assign lane, wristband, or equipment if applicable
        6. IssueWristbandActivity — generate wristband code if integration is active

        A Temporal timer is set for auto-close at `flow_config.auto_close_minutes`. Staff will receive a warning notification at 75% of that interval.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalkInCheckInRequest'
      responses:
        '201':
          description: Walk-in booking created
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking_id:
                    type: string
                    format: uuid
                  order_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum:
                      - checked_in
                  checked_in_at:
                    type: string
                    format: date-time
                  auto_close_at:
                    type: string
                    format: date-time
                    description: Timestamp when the session will be auto-closed if not manually closed
                  wristband_code:
                    type: [string, 'null']

                    description: Issued wristband code if wristband integration is active
                  order:
                    $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/walk-in/assign:
    post:
      tags:
        - Booking
      summary: Assign walk-in to activity or resource
      operationId: walkInAssign
      description: Assign an active walk-in session to a specific activity resource (lane, room, equipment). Can also add extras to the open order during the session. Only valid when the booking is in `checked_in` status. Updates the order's line items and returns the revised order total.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalkInAssignRequest'
      responses:
        '200':
          description: Walk-in assigned to resource; order updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking_id:
                    type: string
                    format: uuid
                  order:
                    $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/walk-in/attach-booking:
    post:
      tags:
        - Booking
      summary: Convert walk-in to full booking
      operationId: walkInAttachBooking
      description: Convert an active walk-in session to a full booking record, linking it to an existing order if provided or closing the open walk-in order. Dispatches `WalkInCloseWorkflow` to finalize extras, calculate totals, process payment, transition the booking to `checked_out`, and release capacity. Returns the finalized order, payment confirmation, and a receipt URL.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalkInAttachRequest'
      responses:
        '200':
          description: Walk-in session closed and converted to full booking
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum:
                      - checked_out
                  checked_out_at:
                    type: string
                    format: date-time
                  session_duration_minutes:
                    type: integer
                  order:
                    $ref: '#/components/schemas/Order'
                  payment:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum:
                          - captured
                          - pending
                          - failed
                      amount:
                        type: integer
                        description: Amount in smallest currency unit (e.g. cents)
                      method:
                        type: string
                      card_last_four:
                        type: [string, 'null']

                  receipt_url:
                    type: string
                    format: uri
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'
