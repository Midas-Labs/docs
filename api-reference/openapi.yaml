        '404':
          $ref: '#/components/responses/NotFoundError'

  /v1/scheduling/feed:
    get:
      tags:
        - Scheduling
      summary: Scheduling WebSocket feed
      operationId: schedulingFeed
      description: |
        Real-time WebSocket feed for scheduling events. Upgrade an HTTP GET to a WebSocket connection to receive live availability and occupancy updates for subscribed products and locations.

        Clients send a subscribe message after connecting:
        ```json
        { "action": "subscribe", "product_ids": ["uuid", "uuid"], "location_id": "uuid" }
        ```

        The server pushes events as availability changes (slot bookings, occupancy check-ins/check-outs, capacity window updates):
        ```json
        {
          "type": "availability_changed",
          "product_id": "uuid",
          "date": "2026-04-15",
          "model": "flow_based",
          "current_occupancy": 48,
          "max_concurrent": 80,
          "available_capacity": 32
        }
        ```
      parameters:
        - name: location_id
          in: query
          schema:
            type: string
            format: uuid
          description: Location to scope the feed to
      x-websocket:
        protocol: ws
        upgrade: true
        events:
          - name: availability_changed
            description: Fired when slot availability or flow-based occupancy changes for a subscribed product
            payload:
              type: object
              properties:
                type:
                  type: string
                  enum:
                    - availability_changed
                product_id:
                  type: string
                  format: uuid
                date:
                  type: string
                  format: date
                model:
                  type: string
                  enum:
                    - time_slotted
                    - flow_based
                    - hybrid
                current_occupancy:
                  type: [integer, 'null']

                max_concurrent:
                  type: [integer, 'null']

                available_capacity:
                  type: integer
          - name: capacity_window_updated
            description: Fired when a capacity window's occupancy or configuration changes
            payload:
              type: object
              properties:
                type:
                  type: string
                  enum:
                    - capacity_window_updated
                capacity_window_id:
                  type: string
                  format: uuid
                current_occupancy:
                  type: integer
                max_concurrent:
                  type: integer
        clientMessages:
          - name: subscribe
            description: Subscribe to availability updates for specific products
            payload:
              type: object
              required:
                - action
                - product_ids
              properties:
                action:
                  type: string
                  enum:
                    - subscribe
                    - unsubscribe
                product_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                location_id:
                  type: string
                  format: uuid
      responses:
        '101':
          description: Switching Protocols — WebSocket connection established
        '401':
          $ref: '#/components/responses/UnauthorizedError'

