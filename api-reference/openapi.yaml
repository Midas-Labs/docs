openapi: 3.1.0
info:
  title: Unified Platform API
  version: '2026-04-01'
  description: |
    REST API for the Unified Platform — Phase A (core operations) and Phase B
    (scheduling engine, billing, org hierarchy, widget, waitlist). JSON request
    and response bodies. Standard HTTP verbs and status codes.

    ## Authentication

    | Method | Header | Use case |
    |--------|--------|----------|
    | JWT Bearer | `Authorization: Bearer <jwt>` | User sessions (RS256, 15 min access / 7 day refresh) |
    | API Key | `Authorization: Bearer sk_live_...` | Server-to-server (`sk_test_` for sandbox) |
    | Widget Session | `X-Widget-Session: ws_...` | Embeddable booking widget (30 min TTL) |

    JWT claims: `tid` (tenant), `lid` (location), `roles[]`.

    ## Pagination

    List endpoints use ID-based cursor pagination:

    | Parameter | Type | Description |
    |-----------|------|-------------|
    | `limit` | integer | Items per page (1–100, default 10) |
    | `starting_after` | string | Object ID — page after this object |
    | `ending_before` | string | Object ID — page before this object |

    Response envelope:
    ```json
    { "object": "list", "url": "/v1/customers", "has_more": true, "data": [...] }
    ```

    ## Expanding Objects

    Related objects return as IDs by default. Expand inline with `?expand[]=field`:

        GET /v1/orders/ord_123?expand[]=customer&expand[]=bookings

    Max depth: 4 levels.

    ## Errors

    ```json
    {
      "error": {
        "type": "validation_error",
        "code": "BOOKING_SLOT_UNAVAILABLE",
        "message": "The requested time slot is no longer available.",
        "param": "slot_id",
        "request_id": "req_abc123",
        "doc_url": "https://docs.platform.io/errors/BOOKING_SLOT_UNAVAILABLE"
      }
    }
    ```

    Types: `api_error` | `validation_error` | `business_error` | `idempotency_error`.

    ## Idempotency

    POST requests accept `Idempotency-Key` header (UUID). Cached 24h.
    Reuse with different params → 409 Conflict.

    ## Versioning

    Primary: URL path (`/v1/`). Per-request override: `X-API-Version` header.

    ## Request IDs

    Every response includes `Request-Id` header.

    ## Metadata

    Most mutable resources accept `metadata` — up to 50 key-value string pairs.
  contact:
    name: Platform Engineering
    email: engineering@platform.io
  license:
    name: Proprietary

servers:
  - url: https://api.platform.io
    description: Public API
  - url: https://api-admin.platform.io
    description: Admin API (private ALB — org hierarchy, billing admin, system admin)

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Login, logout, token refresh, MFA, SSO, and session management
  - name: Tenants
    description: Tenant configuration and settings
  - name: Locations
    description: Venue locations within a tenant
  - name: Users
    description: Staff users, roles, and permissions
  - name: Time Clock
    description: Staff clock-in / clock-out entries
  - name: Customers
    description: Customer profiles, payment methods, credits, and segments
  - name: Participants
    description: Activity participants linked to customers
  - name: Waivers
    description: Digital waiver templates and signatures
  - name: Reviews
    description: Customer reviews and ratings
  - name: Products
    description: Product catalog with pricing tiers, extras, and questions
  - name: Scheduling
    description: Schedules, resources, availability blocks, and capacity management
  - name: Booking
    description: Shopping carts, orders, bookings, and walk-in flows
  - name: Payments
    description: Payment processing, refunds, tax rates, fee rules, and cash drawers
  - name: POS
    description: Point-of-sale checks, menu layouts, and device management
  - name: Racing
    description: Heats, lap timing, leaderboards, tracks, and live timing feeds
  - name: Promotions
    description: Campaigns, discount codes, gift cards, and affiliate tracking
  - name: Membership
    description: Membership types, subscriptions, loyalty programs, and points
  - name: Communications
    description: Email / SMS templates, automations, webhooks, and notifications
  - name: Admin
    description: Activity logs, API keys, notes, integrations, and system settings
  - name: Organizations
    description: "Multi-tenant org hierarchy: organizations, tenant groups, settings cascade"
  - name: Billing
    description: Operator subscription billing, invoices, usage metering, and plan admin
  - name: Widget
    description: Embeddable booking widget — config, products, checkout sessions
  - name: Waitlist
    description: Walk-in waitlist queue management

paths:
  /v1/auth/login:
    post:
      operationId: login
      summary: Authenticate with email and password
      description: Initiates a Kratos login flow. Returns JWT tokens on success, or an MFA challenge if the organization policy requires multi-factor authentication.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful or MFA challenge issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh access token
      description: Exchanges a valid refresh token for a new access token and rotated refresh token via Hydra. The old refresh token is immediately invalidated.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/logout:
    post:
      operationId: logout
      summary: Invalidate session
      description: Revokes the Kratos session, invalidates the Hydra refresh token, and deletes the Redis session metadata. The access token remains valid until its 15-minute TTL expires.
      tags:
        - Auth
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
                  description: The refresh token to revoke
      responses:
        '200':
          description: Session successfully invalidated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Session invalidated
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/auth/session:
    get:
      operationId: getSession
      summary: Get current session info
      description: Returns current session details including identity traits, MFA enrollment status, active tenant, and available tenants.
      tags:
        - Auth
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExpandParam'
      responses:
        '200':
          description: Current session information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/auth/password/reset-request:
    post:
      operationId: requestPasswordReset
      summary: Request password reset email
      description: Initiates a Kratos recovery flow. Always returns 200 regardless of whether the email exists to prevent account enumeration. A 6-digit recovery code with a 1-hour expiry is sent via SES if the account exists.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '200':
          description: Recovery email sent if account exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: If an account with that email exists, a recovery email has been sent
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/password/reset:
    post:
      operationId: completePasswordReset
      summary: Complete password reset with token
      description: Completes the Kratos password reset flow using the 6-digit recovery code. On success, invalidates all existing sessions and updates the password hash (argon2id).
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
      responses:
        '200':
          description: Password successfully updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password updated
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/mfa/enroll:
    post:
      operationId: enrollMfa
      summary: Enroll in MFA (TOTP)
      description: Initiates a Kratos settings flow to enroll a TOTP authenticator. Returns a QR code (base64 PNG) and the raw TOTP secret for manual entry. The enrollment is completed by calling POST /v1/auth/mfa/verify with the flow_id and a valid code.
      tags:
        - Auth
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaEnrollRequest'
      responses:
        '200':
          description: MFA enrollment initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  flow_id:
                    type: string
                    description: Kratos settings flow ID, required for verification step
                  qr_code:
                    type: string
                    description: Base64-encoded PNG QR code for authenticator app scanning
                  secret:
                    type: string
                    description: Raw TOTP secret for manual entry
                  totp_url:
                    type: string
                    description: otpauth:// URI
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/mfa/verify:
    post:
      operationId: verifyMfa
      summary: Verify MFA code
      description: Verifies a TOTP, WebAuthn, or SMS OTP code during MFA enrollment or as the second factor during login. On successful enrollment, returns 12 single-use recovery codes.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerifyRequest'
      responses:
        '200':
          description: MFA code verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  enrolled:
                    type: boolean
                    description: True if this was an enrollment verification
                  recovery_codes:
                    type: array
                    items:
                      type: string
                    description: Single-use recovery codes, present only on initial enrollment
                  access_token:
                    type: string
                    description: JWT access token, present only when verifying during login flow
                  refresh_token:
                    type: string
                    description: Refresh token, present only when verifying during login flow
                  expires_in:
                    type: integer
                    description: Access token TTL in seconds
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/mfa:
    delete:
      operationId: disableMfa
      summary: Disable MFA
      description: Removes the MFA method from the Kratos identity. Requires password confirmation. Not available if organization policy enforces MFA.
      tags:
        - Auth
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  description: Current password for confirmation
      responses:
        '200':
          description: MFA successfully disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/mfa/status:
    get:
      operationId: getMfaStatus
      summary: Get MFA enrollment status
      description: Returns current MFA enrollment state, organization policy, grace period expiry, and recovery code count.
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: MFA status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaStatus'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/auth/sso/{provider}/init:
    post:
      operationId: initSsoLogin
      summary: Initiate SSO login flow
      description: Initiates a Hydra-backed SSO authorization flow for the specified provider. Returns a redirect URL to the enterprise IdP (Okta, Azure AD, Google Workspace, custom SAML/OIDC).
      tags:
        - Auth
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
          description: SSO provider identifier (e.g., org UUID or slug)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoInitRequest'
      responses:
        '200':
          description: SSO authorization URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  redirect_url:
                    type: string
                    description: URL to redirect the user to for IdP authentication
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /v1/auth/sso/{provider}/callback:
    get:
      operationId: ssoCallback
      summary: SSO callback (OAuth2)
      description: Handles the OAuth2 authorization code callback from the enterprise IdP. Exchanges the code for tokens via Hydra, performs JIT provisioning if required, and returns JWT tokens.
      tags:
        - Auth
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
          description: SSO provider identifier
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: OAuth2 authorization code
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: OAuth2 state parameter for CSRF protection
      responses:
        '200':
          description: SSO authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /v1/auth/sso/link:
    post:
      operationId: linkSsoProvider
      summary: Link SSO provider to account
      description: Links an SSO provider identity to an existing authenticated account, allowing the user to log in via SSO as an alternative to password.
      tags:
        - Auth
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoLinkRequest'
      responses:
        '200':
          description: SSO provider linked
          content:
            application/json:
              schema:
                type: object
                properties:
                  linked:
                    type: boolean
                  provider:
                    type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/sso/{provider}:
    delete:
      operationId: unlinkSsoProvider
      summary: Unlink SSO provider
      description: Removes the SSO provider link from the authenticated account. Requires at least one remaining authentication method (password or another SSO provider).
      tags:
        - Auth
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
          description: SSO provider identifier to unlink
      responses:
        '200':
          description: SSO provider unlinked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /v1/auth/sso/providers:
    get:
      operationId: listSsoProviders
      summary: List available SSO providers
      description: Returns the list of SSO providers configured for the authenticated user's organization, including display names and whether SSO is enforced.
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Available SSO providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        display_name:
                          type: string
                        protocol:
                          type: string
                          enum: [saml, oidc]
                        enforce_sso:
                          type: boolean
                  sso_enforced:
                    type: boolean
                    description: Whether SSO is required for this organization
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /v1/auth/tenant-switch:
    post:
      operationId: switchTenant
      summary: Switch active tenant context
      description: Re-issues a Hydra JWT with a different tid claim without requiring re-authentication. The requested tenant_id must be present in the user's tenant_ids[] identity traits.
      tags:
        - Auth
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantSwitchRequest'
      responses:
        '200':
          description: New tokens scoped to the requested tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/tenants:
    get:
      operationId: listTenants
      summary: List tenants
      description: Returns a paginated list of all tenants. Restricted to platform administrators.
      tags:
        - Tenants
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/StartingAfterParam'
        - $ref: '#/components/parameters/EndingBeforeParam'
        - $ref: '#/components/parameters/ExpandParam'
      responses:
        '200':
          description: Paginated list of tenants
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    enum: [list]
                  url:
                    type: string
                  has_more:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tenant'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      operationId: createTenant
      summary: Create tenant
      description: Creates a new tenant and triggers the IdentityProvisioningWorkflow to set up the initial admin user and Keto relation tuples.
      tags:
        - Tenants
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantCreateRequest'
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/tenants/{id}:
    get:
      operationId: getTenant
      summary: Get tenant
      description: Returns the tenant record for the specified ID.
      tags:
        - Tenants
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/ExpandParam'
      responses:
        '200':
          description: Tenant record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      operationId: updateTenant
      summary: Update tenant
      description: Updates mutable tenant fields. RLS ensures the caller can only update tenants within their authorized scope.
      tags:
        - Tenants
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantUpdateRequest'
      responses:
        '200':
          description: Updated tenant record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/tenants/{id}/settings:
    get:
      operationId: getTenantSettings
      summary: Get tenant settings
      description: Returns the full settings JSONB for the tenant, including MFA policy, SSO config, timezone, currency, and feature flags.
      tags:
        - Tenants
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/ExpandParam'
      responses:
        '200':
          description: Tenant settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantSettings'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      operationId: updateTenantSettings
      summary: Update tenant settings
      description: Merges the provided settings object into the tenant's existing settings. Requires tenant admin permissions.
      tags:
        - Tenants
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantSettingsUpdateRequest'
      responses:
        '200':
          description: Updated tenant settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantSettings'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/locations:
    get:
      operationId: listLocations
      summary: List locations
      description: Returns a paginated list of locations for the authenticated tenant, filtered by RLS on the current tid claim.
      tags:
        - Locations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/StartingAfterParam'
        - $ref: '#/components/parameters/EndingBeforeParam'
        - $ref: '#/components/parameters/ExpandParam'
      responses:
        '200':
          description: Paginated list of locations
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    enum: [list]
                  url:
                    type: string
                  has_more:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      operationId: createLocation
      summary: Create location
      description: Creates a new location under the authenticated tenant. Requires tenant admin permissions.
      tags:
        - Locations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationCreateRequest'
      responses:
        '201':
          description: Location created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/locations/{id}:
    get:
      operationId: getLocation
      summary: Get location
      description: Returns the location record for the specified ID. RLS enforces tenant scope.
      tags:
        - Locations
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/ExpandParam'
      responses:
        '200':
          description: Location record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      operationId: updateLocation
      summary: Update location
      description: Updates mutable location fields. Requires tenant admin permissions.
      tags:
        - Locations
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationUpdateRequest'
      responses:
        '200':
