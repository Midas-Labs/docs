  /v1/orders/pay-first:
    post:
      tags:
        - Booking
      summary: Pay First — create prepaid order
      operationId: payFirstOrder
      description: |
        Pay First flow entry point. Creates an order and booking in `pending` status with payment collected upfront (full or deposit percentage as configured on the product's `flow_config`). No date or time is scheduled at this point.

        Dispatches `PrepaidBookingWorkflow` which:
        1. ProcessPaymentActivity — charge deposit or full amount
        2. CreateOrderActivity — insert order + booking with status `pending`
        3. GenerateSchedulingTokenActivity — create single-use HMAC-SHA256 scheduling token
        4. SendSchedulingLinkActivity — email scheduling link to recipient

        The recipient uses the scheduling link (containing the token) to call `POST /v1/bookings/{id}/schedule` later.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_id
                - quantity
                - payment_method_id
                - channel
              properties:
                product_id:
                  type: string
                  format: uuid
                  description: Must be a product with flow_mode = pay_first
                quantity:
                  type: integer
                  minimum: 1
                customer_id:
                  type: string
                  format: uuid
                  description: Purchasing customer. Optional for gift purchases.
                recipient_email:
                  type: string
                  format: email
                  description: Email address to send the scheduling link to. Defaults to customer email if not provided.
                payment_method_id:
                  type: string
                  format: uuid
                payment_token:
                  type: string
                  description: One-time gateway token. Mutually exclusive with payment_method_id.
                channel:
                  type: string
                  enum:
                    - web
                    - kiosk
                    - phone
                    - pos
                    - gift
                extras:
                  type: array
                  items:
                    type: object
                    properties:
                      extra_id:
                        type: string
                        format: uuid
                      quantity:
                        type: integer
                        minimum: 1
      responses:
        '201':
          description: Prepaid order created and scheduling link dispatched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

